<script type="module">
  // Import Firebase y Auth
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

  // Tu configuración de Firebase - ya la tienes bien
  const firebaseConfig = {

  // ⚠️ EDITA ESTA LISTA: Pon aquí los correos que SÍ pueden entrar
  const correosAutorizados = [
    "20190783@unica.edu.pe",
    "Bravojhony06@gmail.com"
  ];

  // Conectar el botón de login
  const botonLogin = document.getElementById('loginBtn') || document.querySelector('button');
  
  botonLogin.addEventListener('click', () => {
    signInWithPopup(auth, provider).then((result) => {
      const email = result.user.email;
      console.log("Usuario:", email);
      
      if (correosAutorizados.includes(email)) {
        window.location.href = 'dashboard.html'; 
      } else {
        window.location.href = 'denegado.html';
      }
    }).catch((error) => {
      console.error("Error:", error);
      alert("Error al iniciar sesión: " + error.message);
    });
  });
</script>
