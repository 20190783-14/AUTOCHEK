<!DOCTYPE html>
<html>
<head>
  <title>AUTOCHEK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
    #header { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; }
    #logout { background: #dc2626; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
    #cargando { text-align: center; padding: 50px; font-size: 18px; }
    iframe { width: 100%; height: 90vh; border: none; display: none; background: white; }
  </style>
</head>
<body>
  <div id="header">
    <h3>AUTOCHEK - Herramientas SUNARP</h3>
    <button id="logout">Cerrar Sesión</button>
  </div>
  <div id="cargando">Verificando tu acceso...</div>
  <iframe id="visor" src="https://drive.google.com/file/d/14_Ln3Pc3_CKxJBKJTvY4WH7Vp_mt4c3G/preview"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAmVSOm8gO_6APuE7K7rDvoybBjT2BqEas",
      authDomain: "autochek-4c5a2.firebaseapp.com",
      projectId: "autochek-4c5a2",
      storageBucket: "autochek-4c5a2.appspot.com",
      messagingSenderId: "853796675776",
      appId: "1:853796675776:web:d54d2683ff2e49a8dbd4a9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const email = user.email.toLowerCase();
        console.log("Buscando usuario:", email);
        const docRef = doc(db, "usuarios", email);
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists() && docSnap.data().activo === true) {
          document.getElementById('cargando').style.display = 'none';
          document.getElementById('visor').style.display = 'block';
        } else {
          console.log("Usuario no encontrado o inactivo");
          alert("No autorizado");
          signOut(auth);
        }
      } else {
        window.location.href = "index.html";
      }
    });

    document.getElementById('logout').addEventListener('click', () => signOut(auth));
  </script>
</body>
</html>
