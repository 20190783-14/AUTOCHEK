<!DOCTYPE html>
<html>
<head>
  <title>AUTOCHEK - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    #header { background: #1a1a1a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    #logout { background: #d32f2f; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
    #pdf-container { padding: 10px; }
    iframe { width: 100%; height: 85vh; border: none; }
    /* Bloquea selección de texto */
    body { user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body oncontextmenu="return false;">
  <div id="header">
    <h3>AUTOCHEK - Herramientas SUNARP</h3>
    <button id="logout">Cerrar Sesión</button>
  </div>

  <div id="pdf-container">
    <iframe 
      src="https://drive.google.com/file/d/14_Ln3Pc3_CKxJBKJTvY4WH7Vp_mt4c3G/preview"
      allow="autoplay">
    </iframe>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAmVSOm8gO_6APuE7K7rDvoybBjT2BqEas",
      authDomain: "autochek-4c5a2.firebaseapp.com",
      projectId: "autochek-4c5a2",
      storageBucket: "autochek-4c5a2.appspot.com",
      messagingSenderId: "853796675776",
      appId: "1:853796675776:web:d54d2683ff2e49a8dbd4a9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const docRef = doc(db, "usuarios", user.email);
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists() || docSnap.data().activo !== true) {
          window.location.href = "index.html";
        }
      } else {
        window.location.href = "index.html";
      }
    });

    document.getElementById('logout').addEventListener('click', () => signOut(auth));

    // Bloquea Ctrl+S, Ctrl+P, Ctrl+U, F12
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && ['s','p','u'].includes(e.key) || e.key === 'F12') {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
