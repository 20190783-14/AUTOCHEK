<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTOCHEK - Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    .header { background: #1a1a1a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h3 { margin: 0; }
    #logout { background: #d32f2f; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
    .contenedor { padding: 20px; max-width: 1200px; margin: 0 auto; }
    iframe { width: 100%; height: 80vh; border: 1px solid #ccc; background: white; }
    .alerta { background: #fff3cd; border: 1px solid #ffc107; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h3>AUTOCHEK - Documento Confidencial</h3>
    <button id="logout">Cerrar Sesión</button>
  </div>

  <div class="contenedor">
    <div class="alerta">
      <b>IMPORTANTE:</b> Este documento es solo para visualización. Está prohibida su descarga y distribución.
    </div>
    
    <!-- VISOR DE PDF CON DRIVE -->
    <iframe 
      src="https://drive.google.com/file/d/14_Ln3Pc3_CKxJBKJTvY4WH7Vp_mt4c3G/preview" 
      allow="autoplay">
    </iframe>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAmVSOm8gO_6APuE7K7rDvoybBjT2BqEas",
      authDomain: "autochek-4c5a2.firebaseapp.com",
      projectId: "autochek-4c5a2",
      storageBucket: "autochek-4c5a2.appspot.com",
      messagingSenderId: "853796675776",
      appId: "1:853796675776:web:d54d2683ff2e49a8dbd4a9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Verificar si el usuario está logueado y activo en Firestore
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const docRef = doc(db, "usuarios", user.email);
        const docSnap = await getDoc(docRef);
        
        if (!docSnap.exists() || docSnap.data().activo !== true) {
          alert("No tienes permiso para acceder.");
          window.location.href = "index.html";
        }
      } else {
        window.location.href = "index.html";
      }
    });

    // Botón cerrar sesión
    document.getElementById('logout').addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      });
    });

    // Bloquear clic derecho
    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
